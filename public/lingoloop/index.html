<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#10243f" />
  <title>LingoLoop Mobile</title>
  <link rel="manifest" href="/lingoloop/manifest.webmanifest" />
  <link rel="stylesheet" href="/lingoloop/styles.css" />
</head>
<body>
  <header class="topbar">
    <h1>LingoLoop</h1>
    <button id="installBtn" class="ghost" hidden>설치</button>
  </header>

  <main class="container">
    <nav class="tabs" id="tabs">
      <button class="tab active" data-tab="learn">학습</button>
      <button class="tab" data-tab="quiz">퀴즈</button>
      <button class="tab" data-tab="speech">발음</button>
      <button class="tab" data-tab="chat">대화</button>
      <button class="tab" data-tab="progress">진도</button>
    </nav>

    <section class="panel key-panel">
      <div class="row">
        <input id="accessKeyInput" placeholder="접근키 (선택)" />
        <button id="saveAccessKeyBtn" type="button">저장</button>
      </div>
      <div class="row">
        <input id="displayNameInput" placeholder="학습자 이름" />
        <button id="guestLoginBtn" type="button">게스트 로그인</button>
      </div>
      <p id="authStatus" class="status"></p>
    </section>

    <section class="panel" data-content="learn">
      <h2>단어 학습</h2>
      <div class="row">
        <select id="wordType">
          <option value="due">due</option>
          <option value="new">new</option>
          <option value="all">all</option>
        </select>
        <button id="loadWordsBtn">불러오기</button>
      </div>
      <form id="addWordForm" class="stack">
        <input id="wordInput" placeholder="word" required />
        <input id="translationInput" placeholder="translation" required />
        <button type="submit">단어 추가</button>
      </form>
      <ul id="wordList" class="list"></ul>
    </section>

    <section class="panel hidden" data-content="speech">
      <h2>발음 점수</h2>
      <textarea id="targetText" placeholder="목표 문장">I reviewed this word today.</textarea>
      <textarea id="spokenText" placeholder="말한 문장"></textarea>
      <button id="scoreSpeechBtn">점수 계산</button>
      <pre id="speechResult" class="result"></pre>
    </section>

    <section class="panel hidden" data-content="quiz">
      <h2>4지선다 퀴즈</h2>
      <button id="loadQuizBtn">문제 받기</button>
      <div id="quizBox" class="hidden">
        <p id="quizPrompt"></p>
        <div id="quizChoices" class="stack"></div>
      </div>
      <pre id="quizResult" class="result"></pre>
    </section>

    <section class="panel hidden" data-content="chat">
      <h2>AI 대화 (프로토타입)</h2>
      <textarea id="chatInput" placeholder="메시지"></textarea>
      <button id="sendChatBtn">전송</button>
      <pre id="chatResult" class="result"></pre>
    </section>

    <section class="panel hidden" data-content="progress">
      <h2>학습 진도</h2>
      <button id="loadProgressBtn">진도 새로고침</button>
      <pre id="progressResult" class="result"></pre>
    </section>

    <p id="status" class="status"></p>
  </main>

  <script src="/lingoloop/app.js"></script>
</body>
</html>
